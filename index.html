<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Admission Form Portal</title>

<link href="assets/css/bootstrap.min.css" rel="stylesheet">
<link href="assets/css/style.css" rel="stylesheet">

</head>
<body>

<div class="container mt-5">
<div class="row justify-content-center">
<div class="col-lg-11 col-md-12">
<div class="card shadow p-4">

<h4 class="text-center mb-3">Admission Form</h4>

<div class="progress mb-3">
  <div id="progressBar" class="progress-bar" style="width:25%"></div>
</div>

<div class="step-indicator">
  <span id="indicator0" class="active">Personal</span>
  <span id="indicator1">Education</span>
  <span id="indicator2">Guardian</span>
  <span id="indicator3">Confirm</span>
</div>

<!-- Step 1 -->
<div class="step active">
<h5>Personal Details</h5>

<div class="row">
  <div class="col-md-4">
    <input class="form-control mt-2" id="surname" placeholder="Surname">
    <div class="error" id="surnameError"></div>
  </div>
  <div class="col-md-4">
    <input class="form-control mt-2" id="firstName" placeholder="First Name">
    <div class="error" id="firstNameError"></div>
  </div>
  <div class="col-md-4">
    <input class="form-control mt-2" id="middleName" placeholder="Middle Name">
  </div>
</div>

<input class="form-control mt-2" id="address" placeholder="Address">
<div class="error" id="addressError"></div>

<div class="row">
  <div class="col-md-4">
    <select class="form-control mt-2" id="gender">
      <option value="">Gender</option>
      <option>Male</option>
      <option>Female</option>
    </select>
    <div class="error" id="genderError"></div>
  </div>

  <div class="col-md-4">
    <input type="date" class="form-control mt-2" id="dob">
    <div class="error" id="dobError"></div>
  </div>

  <div class="col-md-4">
    <input class="form-control mt-2" id="religion" placeholder="Religion">
  </div>
</div>

<input class="form-control mt-2" id="classApplying" placeholder="Class Applying For">
<div class="error" id="classError"></div>
</div>

<!-- Step 2 -->
<div class="step">
<h5>Education</h5>
<div class="row">
  <div class="col-md-6">
    <input class="form-control mt-2" id="school" placeholder="Previous School">
    <div class="error" id="schoolError"></div>
  </div>
  <div class="col-md-6">
    <input class="form-control mt-2" id="grade" placeholder="Last Grade">
    <div class="error" id="gradeError"></div>
  </div>
</div>
</div>

<!-- Step 3 -->
<div class="step">
<h5>Guardian Info</h5>

<input class="form-control mt-2" id="guardianName" placeholder="Guardian Name">
<div class="error" id="guardianNameError"></div>

<div class="row">
  <div class="col-md-4">
    <input class="form-control mt-2" id="guardianPhone" placeholder="Phone">
    <div class="error" id="guardianPhoneError"></div>
  </div>
  <div class="col-md-4">
    <input class="form-control mt-2" id="guardianWhatsapp" placeholder="WhatsApp">
  </div>
  <div class="col-md-4">
    <input class="form-control mt-2" id="guardianEmail" placeholder="Email">
    <div class="error" id="guardianEmailError"></div>
  </div>
</div>
</div>

<!-- Step 4 -->
<div class="step">
<h5>Confirmation</h5>
<div id="summary"></div>
<div id="aiFeedback" class="mt-3"></div>
</div>

<div class="text-center mt-3">
<button class="btn btn-outline-secondary" onclick="prevStep()">Back</button>
<button class="btn btn-primary" onclick="nextStep()">Next</button>
</div>

</div>
</div>
</div>
</div>

<script>
let currentStep = 0;
const steps = document.querySelectorAll('.step');

function showStep(i){
steps.forEach((s,index)=>s.classList.toggle('active',index===i));
updateProgress();
updateIndicators();
}

function updateProgress(){
let percent=((currentStep+1)/steps.length)*100;
document.getElementById('progressBar').style.width=percent+'%';
}

function updateIndicators(){
for(let i=0;i<steps.length;i++){
let el=document.getElementById('indicator'+i);
el.classList.remove('active');
if(i<currentStep){ el.classList.add('completed'); }
if(i===currentStep){ el.classList.add('active'); }
}
}

function clearErrors(){
document.querySelectorAll('.error').forEach(e=>e.innerText='');
}

// Regex patterns
const phoneRegex = /^[0-9]{10,14}$/;
const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

function validateStep(){
clearErrors();
let valid=true;

if(currentStep===0){
if(!surname.value){surnameError.innerText='Required'; valid=false;}
if(!firstName.value){firstNameError.innerText='Required'; valid=false;}
if(!address.value){addressError.innerText='Required'; valid=false;}
if(!gender.value){genderError.innerText='Required'; valid=false;}
if(!dob.value){dobError.innerText='Required'; valid=false;}
if(!classApplying.value){classError.innerText='Required'; valid=false;}
}

if(currentStep===1){
if(!school.value){schoolError.innerText='Required'; valid=false;}
if(!grade.value){gradeError.innerText='Required'; valid=false;}
}

if(currentStep===2){
if(!guardianName.value){guardianNameError.innerText='Required'; valid=false;}
if(!phoneRegex.test(guardianPhone.value)){
  guardianPhoneError.innerText='Invalid phone number'; valid=false;
}
if(!emailRegex.test(guardianEmail.value)){
  guardianEmailError.innerText='Invalid email'; valid=false;
}
}

return valid;
}

function saveData(){
const data={};
document.querySelectorAll('input, select').forEach(el=>data[el.id]=el.value);
localStorage.setItem('formData', JSON.stringify(data));
}

function loadData(){
const data=JSON.parse(localStorage.getItem('formData'));
if(!data) return;
Object.keys(data).forEach(k=>{
let el=document.getElementById(k);
if(el) el.value=data[k];
});
}

function generateSummary(){
let data=JSON.parse(localStorage.getItem('formData'));
let html='';
for(let key in data){ html+=`<p><strong>${key}:</strong> ${data[key]}</p>`; }
document.getElementById('summary').innerHTML=html;

// Simulated AI API feedback
fetch('https://api.example.com/evaluate', {
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body: JSON.stringify(data)
})
.then(res=>res.json())
.then(result=>{
  document.getElementById('aiFeedback').innerHTML = `<div class="alert alert-info">AI Feedback: ${result.feedback}</div>`;
})
.catch(()=>{
  document.getElementById('aiFeedback').innerHTML = `<div class="alert alert-warning">AI service unavailable</div>`;
});
}

function nextStep(){
if(!validateStep()) return;
saveData();

if(currentStep<steps.length-1){
currentStep++;
showStep(currentStep);
if(currentStep===3) generateSummary();
}else{
alert('Submission Complete');
localStorage.removeItem('formData');
}
}

function prevStep(){
if(currentStep>0){currentStep--; showStep(currentStep);} }

loadData();
showStep(currentStep);
</script>

</body>
</html>
